name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -B

    - name: Get version
      id: get_version
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "IS_TAG=true" >> $GITHUB_OUTPUT
        else
          echo "VERSION=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "IS_TAG=false" >> $GITHUB_OUTPUT
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: hekuo-report-${{ steps.get_version.outputs.VERSION }}
        path: target/hekuo-report-*.jar

    - name: Create Release (tags only)
      if: steps.get_version.outputs.IS_TAG == 'true'
      uses: softprops/action-gh-release@v1
      with:
        name: Hekuo's Report ${{ steps.get_version.outputs.VERSION }}
        body: |
          ## Hekuo's Report v${{ steps.get_version.outputs.VERSION }}
          
          ### Features
          - Player reporting system (`/report <player> <reason>`)
          - Admin report management (`/report check`)
          - Ban system with permanent, days, and hours options
          - Activity log viewing with anti-cheat detection (CPS/KillAura/Nuker)
          - Pagination support for reports and logs
          
          ### Installation
          1. Download `hekuo-report-${{ steps.get_version.outputs.VERSION }}.jar`
          2. Place in your server's `plugins` folder
          3. Restart or reload the server
          
          ### Permissions
          - `report.use` - Use /report command (default: true)
          - `report.admin` - Admin commands (default: op)
          
          ### Commands
          - `/report <player> <reason>` - Report a player
          - `/report help` - Show help
          - `/report check` - View reports (admin)
          - `/report logs <player>` - View activity & detection results (admin)
          - `/report ban <player> <perm|day|hour>` - Ban a player (admin)
          
          ---
          Developed by **hekuo**
        files: target/hekuo-report-${{ steps.get_version.outputs.VERSION }}.jar
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
