name: 构建与发布

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 配置 JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: 获取版本号
      id: get_version
      run: |
        echo "VERSION=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

    - name: Maven 构建
      run: mvn clean package -B

    - name: 创建发布
      uses: softprops/action-gh-release@v1
      with:
        name: hekuo举报插件 ${{ steps.get_version.outputs.VERSION }}
        tag_name: ${{ steps.get_version.outputs.VERSION }}
        body: |
          ## hekuo举报插件 ${{ steps.get_version.outputs.VERSION }}
          
          ### 插件类型: BungeeCord 代理端插件
          
          ### 功能特性
          - 玩家举报系统 (`/report 玩家名称 理由`)
          - 管理员举报管理 (`/report check`)
          - 封禁系统：永久封禁、按天封禁、按时封禁
          - 跨服举报通知，支持多子服务器
          - 举报列表分页显示
          
          ### 安装方法
          1. 下载 `hekuo-report-${{ steps.get_version.outputs.VERSION }}.jar`
          2. 放入 **BungeeCord** 的 `plugins` 文件夹 (不是子服务器的plugins!)
          3. 重启或重载 BungeeCord
          
          ### 权限说明
          - `report.use` - 使用 /report 命令 (默认: 所有人)
          - `report.admin` - 管理员命令 (默认: OP)
          
          ### 命令列表
          - `/report <玩家> <理由>` - 举报玩家
          - `/report help` - 显示帮助信息
          - `/report check` - 查看举报列表 (管理员)
          - `/report ban perm|days|hours <玩家>` - 封禁玩家 (管理员)
          
          ---
          作者: **hekuo**
        files: target/hekuo-report-*.jar
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
