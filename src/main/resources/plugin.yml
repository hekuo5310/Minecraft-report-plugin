name: hekuo举报插件
version: ${project.version}
main: com.hekuo.report.HekuoReport
author: hekuo
description: Minecraft Bukkit服务器举报插件
api-version: '1.21'

commands:
  report:
    description: 举报玩家或管理举报
    usage: |
      /report <玩家> <理由> - 举报玩家
      /report help - 显示帮助信息
      /report check - 查看举报 (仅管理员)
    permission: report.use
    permission-message: 你没有权限使用此命令

permissions:
  report.use:
    description: 允许使用/report命令
    default: true
  report.admin:
    description: 允许查看和处理举报
    default: op
